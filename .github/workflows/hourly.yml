name: hourly-scrape

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-scrape
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Restore notification-state cache
        uses: actions/cache/restore@v5
        with:
          path: state
          key: bank-bot-state-v1-${{ github.run_id }}
          restore-keys: |
            bank-bot-state-v1-

      - run: bash scripts/run-once.sh
        env:
          HAPOALIM_USER_CODE: ${{ secrets.HAPOALIM_USER_CODE }}
          HAPOALIM_PASSWORD: ${{ secrets.HAPOALIM_PASSWORD }}
          CAL_1_OWNER: ${{ secrets.CAL_1_OWNER }}
          CAL_1_USERNAME: ${{ secrets.CAL_1_USERNAME }}
          CAL_1_PASSWORD: ${{ secrets.CAL_1_PASSWORD }}
          CAL_2_OWNER: ${{ secrets.CAL_2_OWNER }}
          CAL_2_USERNAME: ${{ secrets.CAL_2_USERNAME }}
          CAL_2_PASSWORD: ${{ secrets.CAL_2_PASSWORD }}
          KAPSO_API_KEY: ${{ secrets.KAPSO_API_KEY }}
          KAPSO_PHONE_NUMBER_ID: ${{ secrets.KAPSO_PHONE_NUMBER_ID }}
          WHATSAPP_RECIPIENTS: ${{ secrets.WHATSAPP_RECIPIENTS }}

      - name: Save notification-state cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: state
          key: bank-bot-state-v1-${{ github.run_id }}
